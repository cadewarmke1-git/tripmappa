<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 20" width="40" height="20" role="img" aria-label="Vintage car map marker, top-down view">
  <defs>
    <!-- Reflective gold body: bright highlight -> base gold -> warm shadow -->
    <linearGradient id="goldBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FFF3DC" />
      <stop offset="0.22" stop-color="#FFE1AF" />
      <stop offset="0.5"  stop-color="#FFD28C" />
      <stop offset="0.8"  stop-color="#E9AE63" />
      <stop offset="1"    stop-color="#C98A3E" />
    </linearGradient>

    <!-- Glassy cabin gold with a cooler polished sheen -->
    <linearGradient id="goldCabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFF7E8" />
      <stop offset="0.5" stop-color="#FFDCA0" />
      <stop offset="1"   stop-color="#D89A4C" />
    </linearGradient>

    <!-- Soft radial sheen to fake a curved, reflective surface -->
    <radialGradient id="sheen" cx="0.36" cy="0.3" r="0.75">
      <stop offset="0"    stop-color="#FFFFFF" stop-opacity="0.85" />
      <stop offset="0.35" stop-color="#FFFFFF" stop-opacity="0.25" />
      <stop offset="0.7"  stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Wheels (visible poking out from the body sides) -->
  <g fill="#0D0A1A">
    <rect x="8"  y="0.5"  width="6" height="3"   rx="1.3" />
    <rect x="8"  y="16.5" width="6" height="3"   rx="1.3" />
    <rect x="26" y="0.5"  width="6" height="3"   rx="1.3" />
    <rect x="26" y="16.5" width="6" height="3"   rx="1.3" />
  </g>

  <!-- Car body: long, wide, rounded — 1950s American profile -->
  <path
    d="M4.5 10
       C4.5 5.4 7 2.6 12 2.4
       C18 2.1 24 2.1 30 2.4
       C34 2.6 35.5 5 35.5 10
       C35.5 15 34 17.4 30 17.6
       C24 17.9 18 17.9 12 17.6
       C7 17.4 4.5 14.6 4.5 10 Z"
    fill="url(#goldBody)" stroke="#0D0A1A" stroke-width="1.4" stroke-linejoin="round" />

  <!-- Reflective sheen overlay clipped to the body shape -->
  <path
    d="M4.5 10
       C4.5 5.4 7 2.6 12 2.4
       C18 2.1 24 2.1 30 2.4
       C34 2.6 35.5 5 35.5 10
       C35.5 15 34 17.4 30 17.6
       C24 17.9 18 17.9 12 17.6
       C7 17.4 4.5 14.6 4.5 10 Z"
    fill="url(#sheen)" />

  <!-- Specular highlight streak across the hood -->
  <path
    d="M7.5 6.4
       C13 5.2 22 5 30 5.6
       C31.5 5.9 31.6 7 30.2 7.2
       C22 6.8 13.5 7 8.4 8
       C6.8 8.3 6.2 6.7 7.5 6.4 Z"
    fill="#FFFFFF" opacity="0.5" />

  <!-- Cabin / roof: rounded glassy greenhouse in the center -->
  <path
    d="M14 10
       C14 6.6 15.6 5.4 18.5 5.3
       C21 5.2 23.5 5.2 25 5.6
       C26.6 6 27 7.8 27 10
       C27 12.2 26.6 14 25 14.4
       C23.5 14.8 21 14.8 18.5 14.7
       C15.6 14.6 14 13.4 14 10 Z"
    fill="url(#goldCabin)" stroke="#0D0A1A" stroke-width="1.2" stroke-linejoin="round" />

  <!-- Cabin top-edge glare -->
  <path
    d="M15.6 6.6
       C18.5 5.9 22.5 5.9 25 6.4
       C25.8 6.6 25.6 7.4 24.8 7.3
       C22 6.9 18.5 6.9 16 7.5
       C15.1 7.7 14.8 6.8 15.6 6.6 Z"
    fill="#FFFFFF" opacity="0.55" />

  <!-- Windshield / rear window split line -->
  <line x1="20.5" y1="5.4" x2="20.5" y2="14.6" stroke="#0D0A1A" stroke-width="0.9" />

  <!-- Hood accent line toward the front -->
  <line x1="7" y1="10" x2="12.5" y2="10" stroke="#0D0A1A" stroke-width="0.9" stroke-linecap="round" />
</svg>
