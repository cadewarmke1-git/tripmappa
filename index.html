    <meta property="og:title" content="TripMappa — Road trip planning that knows your route" />
    <meta property="og:description" content="Plan stops, lodging, and fuel along your actual route — hotels, restaurants, fuel stops, EV charging, and truck routing in one app." />

    <meta property="og:image" content="https://tripmappa.com/og-image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TripMappa — Road trip planning that knows your route" />
    <meta name="twitter:description" content="Plan stops, lodging, and fuel along your actual route — hotels, restaurants, fuel stops, EV charging, and truck routing in one app." />
    <meta name="twitter:image" content="https://tripmappa.com/og-image.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TripMappa",
        "url": "https://tripmappa.com",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "AggregateOffer",
          "lowPrice": "0",
          "highPrice": "9.99",
          "priceCurrency": "USD",
          "offerCount": "3",
          "description": "Free Wanderer plan and paid Voyager ($4.99/mo) and Trailblazer ($9.99/mo) subscriptions"
        }
      }
    </script>
    <link rel="preload" as="image" href="/hero-mountain.jpg" fetchpriority="high" />
    <script>
      (function () {
        var w = window.matchMedia("(min-width: 769px)").matches;
        var fine = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
        document.documentElement.dataset.layout = w || fine ? "web" : "mobile";

        var wideMq = window.matchMedia("(min-width: 769px)");
        var pointerMq = window.matchMedia("(hover: hover) and (pointer: fine)");
        var resizeTimer;

        function syncLayout() {
          document.documentElement.dataset.layout = wideMq.matches || pointerMq.matches ? "web" : "mobile";
        }

        function onResize() {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(syncLayout, 150);
        }

        wideMq.addEventListener("change", syncLayout);
        pointerMq.addEventListener("change", syncLayout);
        window.addEventListener("resize", onResize, { passive: true });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        window.addEventListener("vite:preloadError", function (event) {
          var err = event.payload;
          var msg = err && err.message ? err.message : String(err || "");
          if (msg.indexOf("Unable to preload CSS for") === 0) {
            event.preventDefault();
          }
        });

        window.addEventListener("error", function (event) {
          var target = event.target;
          if (!target || target.tagName !== "SCRIPT" || !target.src) return;
          if (target.src.indexOf("/assets/") === -1) return;
          if (sessionStorage.getItem("tm-chunk-reload")) return;
          sessionStorage.setItem("tm-chunk-reload", "1");
          window.location.reload();
        }, true);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
